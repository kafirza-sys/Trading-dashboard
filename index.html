<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0d1117;color:#e6edf3;padding:20px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1.2rem;border-bottom:1px solid #21262d;}
.logo{font-size:20px;font-weight:bold;}
.live-pill{font-size:11px;padding:3px 10px;border:1px solid #238636;border-radius:20px;color:#3fb950;margin-right:10px;}
.si{padding:9px 14px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#e6edf3;font-size:13px;width:180px;}
.sb{padding:9px 18px;border:none;border-radius:8px;background:#238636;color:#fff;font-size:13px;cursor:pointer;}
.sec{display:flex;align-items:center;gap:10px;margin:2rem 0 12px;}
.sec-line{flex:1;height:1px;background:#21262d;}
.sec-label{font-size:13px;font-weight:bold;color:#e6edf3;background:#161b22;padding:4px 14px;border-radius:20px;border:1px solid #30363d;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#21262d;border:1px solid #21262d;border-radius:10px;overflow:hidden;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#21262d;border:1px solid #21262d;border-radius:10px;overflow:hidden;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:#21262d;border:1px solid #21262d;border-radius:10px;overflow:hidden;}
.cell{background:#161b22;padding:16px;}
.lbl{font-size:12px;color:#8b949e;margin-bottom:6px;}
.val{font-size:20px;font-weight:bold;color:#e6edf3;}
.chg{font-size:13px;margin:4px 0 10px;}
.up{color:#3fb950;}.dn{color:#f85149;}.neu{color:#8b949e;}
.bar{height:3px;background:#21262d;border-radius:2px;overflow:hidden;}
.bg{height:100%;background:#3fb950;}.br{height:100%;background:#f85149;}.by{height:100%;background:#d29922;}
.hint{font-size:11px;color:#8b949e;margin-top:6px;line-height:1.5;}
.loading{color:#8b949e;font-size:12px;margin-top:4px;}
.error{color:#f85149;font-size:11px;margin-top:4px;}
</style>
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:center;">
    <span class="logo">Trading Dashboard</span>
    <span class="live-pill">LIVE</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <span id="update-time" style="font-size:11px;color:#8b949e;"></span>
    <input class="si" id="ti" placeholder="AAPL, TSLA, SPY..."/>
    <button class="sb" onclick="searchStock()">ניתוח מניה</button>
  </div>
</div>

<div class="sec"><div class="sec-label">קריפטו — נתונים חיים</div><div class="sec-line"></div></div>
<div class="g4" id="crypto-grid">
  <div class="cell"><div class="lbl">ביטקוין BTC</div><div class="val" id="btc-price">טוען...</div><div class="chg" id="btc-chg"></div><div class="bar"><div class="bg" id="btc-bar" style="width:50%"></div></div></div>
  <div class="cell"><div class="lbl">את'ריום ETH</div><div class="val" id="eth-price">טוען...</div><div class="chg" id="eth-chg"></div><div class="bar"><div class="bg" id="eth-bar" style="width:50%"></div></div></div>
  <div class="cell"><div class="lbl">סולנה SOL</div><div class="val" id="sol-price">טוען...</div><div class="chg" id="sol-chg"></div><div class="bar"><div class="bg" id="sol-bar" style="width:50%"></div></div></div>
  <div class="cell"><div class="lbl">BTC Dominance</div><div class="val" id="btc-dom">טוען...</div><div class="chg" id="btc-dom-chg"></div><div class="hint">עולה = אלטים נחלשים</div></div>
</div>

<div class="sec"><div class="sec-label">מאקרו — נתונים קבועים</div><div class="sec-line"></div></div>
<div class="g4">
  <div class="cell"><div class="lbl">S&P 500</div><div class="val">5,421</div><div class="chg up">+0.7%</div><div class="bar"><div class="bg" style="width:65%"></div></div></div>
  <div class="cell"><div class="lbl">נאסד"ק</div><div class="val">19,204</div><div class="chg dn">-0.4%</div><div class="bar"><div class="br" style="width:42%"></div></div></div>
  <div class="cell"><div class="lbl">דאו ג'ונס</div><div class="val">40,212</div><div class="chg up">+0.3%</div><div class="bar"><div class="bg" style="width:60%"></div></div></div>
  <div class="cell"><div class="lbl">ראסל 2000</div><div class="val">2,012</div><div class="chg up">+1.2%</div><div class="bar"><div class="bg" style="width:72%"></div></div></div>
</div>

<div id="stock-result" style="margin-top:2rem;display:none;">
  <div class="sec"><div class="sec-label" id="stock-title">ניתוח מניה</div><div class="sec-line"></div></div>
  <div id="stock-content"></div>
</div>

<script>
const COINGECKO_KEY = 'CG-FvE2mXRFqvbmHX4WqD18oauc';

async function loadCrypto() {
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true&x_cg_demo_api_key=${COINGECKO_KEY}`);
    const data = await res.json();
    
    updateCrypto('btc', data.bitcoin, 'bitcoin');
    updateCrypto('eth', data.ethereum, 'ethereum');
    updateCrypto('sol', data.solana, 'solana');
    
    document.getElementById('update-time').textContent = 'עודכן: ' + new Date().toLocaleTimeString('he-IL');
  } catch(e) {
    console.error('Crypto error:', e);
  }
}

function updateCrypto(id, data, name) {
  if (!data) return;
  const price = data.usd;
  const chg = data.usd_24h_change;
  const isUp = chg >= 0;
  
  document.getElementById(`${id}-price`).textContent = '$' + price.toLocaleString('en-US', {maximumFractionDigits: 2});
  const chgEl = document.getElementById(`${id}-chg`);
  chgEl.textContent = (isUp ? '+' : '') + chg.toFixed(2) + '%';
  chgEl.className = 'chg ' + (isUp ? 'up' : 'dn');
  
  const barEl = document.getElementById(`${id}-bar`);
  const barWidth = Math.min(Math.max(50 + chg * 2, 5), 95);
  barEl.style.width = barWidth + '%';
  barEl.className = isUp ? 'bg' : 'br';
}

async function loadBTCDominance() {
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/global?x_cg_demo_api_key=${COINGECKO_KEY}`);
    const data = await res.json();
    const dom = data.data.market_cap_percentage.btc;
    document.getElementById('btc-dom').textContent = dom.toFixed(1) + '%';
    document.getElementById('btc-dom-chg').textContent = 'שוק קריפטו כולל';
    document.getElementById('btc-dom-chg').className = 'chg neu';
  } catch(e) {}
}

async function searchStock() {
  const ticker = document.getElementById('ti').value.trim().toUpperCase();
  if (!ticker) return;
  
  document.getElementById('stock-result').style.display = 'block';
  document.getElementById('stock-title').textContent = ticker + ' — טוען...';
  document.getElementById('stock-content').innerHTML = '<div style="color:#8b949e;padding:20px;">טוען נתונים...</div>';
  
  try {
    const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=d7fusg1r01qqb8rhntigd7fusg1r01qqb8rhntj0`);
    const data = await res.json();
    
    if (data.c === 0) {
      document.getElementById('stock-content').innerHTML = '<div style="color:#f85149;padding:20px;">סימול לא נמצא</div>';
      return;
    }
    
    const price = data.c;
    const change = data.d;
    const changePct = data.dp;
    const isUp = change >= 0;
    
    document.getElementById('stock-title').textContent = ticker + ' — ניתוח מניה';
    document.getElementById('stock-content').innerHTML = `
      <div class="g4" style="margin-bottom:12px;">
        <div class="cell">
          <div class="lbl">מחיר נוכחי</div>
          <div class="val">$${price.toFixed(2)}</div>
          <div class="chg ${isUp?'up':'dn'}">${isUp?'+':''}${changePct.toFixed(2)}%</div>
        </div>
        <div class="cell">
          <div class="lbl">שינוי יומי</div>
          <div class="val ${isUp?'up':'dn'}">${isUp?'+':''}$${change.toFixed(2)}</div>
          <div class="chg neu">מול אתמול</div>
        </div>
        <div class="cell">
          <div class="lbl">שיא יומי</div>
          <div class="val">$${data.h.toFixed(2)}</div>
          <div class="chg neu">High</div>
        </div>
        <div class="cell">
          <div class="lbl">שפל יומי</div>
          <div class="val">$${data.l.toFixed(2)}</div>
          <div class="chg neu">Low</div>
        </div>
      </div>
    `;
    
    document.getElementById('stock-result').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    document.getElementById('stock-content').innerHTML = '<div style="color:#f85149;padding:20px;">שגיאה בטעינת הנתונים</div>';
  }
}

loadCrypto();
loadBTCDominance();
setInterval(loadCrypto, 60000);
</script>
</body>
</html>
