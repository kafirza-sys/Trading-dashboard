<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0d1117;color:#e6edf3;padding:20px;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1.2rem;border-bottom:1px solid #21262d;}
.logo{font-size:22px;font-weight:bold;color:#e6edf3;}
.live-pill{font-size:11px;padding:3px 10px;border:1px solid #238636;border-radius:20px;color:#3fb950;margin-right:10px;}
.si{padding:10px 14px;border:1px solid #30363d;border-radius:8px;background:#161b22;color:#e6edf3;font-size:14px;width:200px;}
.sb{padding:10px 20px;border:none;border-radius:8px;background:#238636;color:#fff;font-size:14px;cursor:pointer;}
.sec{display:flex;align-items:center;gap:10px;margin:2rem 0 12px;}
.sec-line{flex:1;height:1px;background:#21262d;}
.sec-label{font-size:13px;font-weight:bold;color:#e6edf3;background:#161b22;padding:4px 14px;border-radius:20px;border:1px solid #30363d;}
.widget-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:12px;}
.widget-box{background:#161b22;border:1px solid #21262d;border-radius:10px;overflow:hidden;}
.widget-full{background:#161b22;border:1px solid #21262d;border-radius:10px;overflow:hidden;margin-bottom:12px;}
.gauge-track{height:6px;background:#21262d;border-radius:3px;overflow:hidden;}
.gauge-fill{height:100%;border-radius:3px;}
.sentiment-bar{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px 20px;margin-bottom:1.6rem;display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
.bdg{font-size:11px;padding:3px 10px;border-radius:20px;}
.bdg-r{background:#3a1a1a;color:#f85149;border:1px solid #da3633;}
.bdg-y{background:#2d2a1a;color:#d29922;border:1px solid #9e6a03;}
.bdg-g{background:#1a3a2a;color:#3fb950;border:1px solid #2ea043;}
</style>
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:center;">
    <span class="logo">Trading Dashboard</span>
    <span class="live-pill">LIVE</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <input class="si" id="ti" placeholder="AAPL, TSLA, SPY..." onkeydown="if(event.key==='Enter')searchStock()"/>
    <button class="sb" onclick="searchStock()">ניתוח מניה</button>
  </div>
</div>

<!-- SENTIMENT -->
<div class="sentiment-bar">
  <div style="flex:1;min-width:120px;">
    <div style="font-size:11px;color:#8b949e;margin-bottom:5px;">Fear & Greed</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="font-size:28px;font-weight:bold;" id="fg-val">--</div>
      <span class="bdg bdg-y" id="fg-label">טוען...</span>
    </div>
    <div class="gauge-track" style="margin-top:7px;"><div class="gauge-fill" id="fg-bar" style="width:50%;background:#d29922;"></div></div>
  </div>
  <div style="width:1px;height:50px;background:#21262d;"></div>
  <div style="flex:1;min-width:120px;">
    <div style="font-size:11px;color:#8b949e;margin-bottom:5px;">BTC Dominance</div>
    <div style="font-size:28px;font-weight:bold;color:#e6edf3;" id="btc-dom">--</div>
    <div style="font-size:11px;color:#8b949e;margin-top:5px;">עולה = אלטים נחלשים</div>
  </div>
  <div style="width:1px;height:50px;background:#21262d;"></div>
  <div style="flex:1;min-width:120px;">
    <div style="font-size:11px;color:#8b949e;margin-bottom:5px;">עונתיות — אפריל</div>
    <div style="font-size:16px;font-weight:bold;color:#3fb950;margin-top:5px;">חיובי היסטורית</div>
    <div style="font-size:11px;color:#8b949e;margin-top:5px;">+2.1% ממוצע · Sell in May מתקרב</div>
  </div>
</div>

<!-- MARKETS TICKER -->
<div class="sec"><div class="sec-label">שוק המניות — נתונים חיים</div><div class="sec-line"></div></div>
<div class="widget-full">
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
  {
    "colorTheme": "dark",
    "dateRange": "12M",
    "showChart": true,
    "locale": "en",
    "largeChartUrl": "",
    "isTransparent": false,
    "showSymbolLogo": true,
    "showFloatingTooltip": false,
    "width": "100%",
    "height": "400",
    "tabs": [
      {
        "title": "Indices",
        "symbols": [
          {"s": "FOREXCOM:SPXUSD", "d": "S&P 500"},
          {"s": "FOREXCOM:NSXUSD", "d": "Nasdaq"},
          {"s": "FOREXCOM:DJI", "d": "Dow Jones"},
          {"s": "AMEX:IWM", "d": "Russell 2000"}
        ]
      },
      {
        "title": "Crypto",
        "symbols": [
          {"s": "BINANCE:BTCUSDT", "d": "Bitcoin"},
          {"s": "BINANCE:ETHUSDT", "d": "Ethereum"},
          {"s": "BINANCE:SOLUSDT", "d": "Solana"}
        ]
      },
      {
        "title": "Commodities",
        "symbols": [
          {"s": "AMEX:GLD", "d": "Gold"},
          {"s": "AMEX:SLV", "d": "Silver"},
          {"s": "AMEX:USO", "d": "Oil"},
          {"s": "TVC:VIX", "d": "VIX"}
        ]
      }
    ]
  }
  </script>
</div>
</div>

<!-- CRYPTO TICKER -->
<div class="sec"><div class="sec-label">קריפטו — נתונים חיים</div><div class="sec-line"></div></div>
<div class="widget-full">
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
  {
    "symbols": [
      {"proName": "BINANCE:BTCUSDT", "title": "Bitcoin"},
      {"proName": "BINANCE:ETHUSDT", "title": "Ethereum"},
      {"proName": "BINANCE:SOLUSDT", "title": "Solana"},
      {"proName": "BINANCE:BNBUSDT", "title": "BNB"},
      {"proName": "BINANCE:XRPUSDT", "title": "XRP"}
    ],
    "showSymbolLogo": true,
    "isTransparent": false,
    "displayMode": "adaptive",
    "colorTheme": "dark",
    "locale": "en"
  }
  </script>
</div>
</div>

<!-- SECTORS -->
<div class="sec"><div class="sec-label">סקטורים — ביצועים</div><div class="sec-line"></div></div>
<div class="widget-full">
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
  {
    "colorTheme": "dark",
    "dateRange": "1D",
    "showChart": false,
    "locale": "en",
    "width": "100%",
    "height": "300",
    "tabs": [
      {
        "title": "Sectors",
        "symbols": [
          {"s": "AMEX:XLE", "d": "Energy"},
          {"s": "AMEX:XLI", "d": "Industrials"},
          {"s": "AMEX:XLF", "d": "Financials"},
          {"s": "AMEX:XLV", "d": "Healthcare"},
          {"s": "AMEX:XLK", "d": "Technology"},
          {"s": "AMEX:XLC", "d": "Communication"},
          {"s": "AMEX:XLB", "d": "Materials"},
          {"s": "AMEX:XLRE", "d": "Real Estate"}
        ]
      }
    ]
  }
  </script>
</div>
</div>

<!-- STOCK SEARCH -->
<div class="sec"><div class="sec-label">ניתוח מניה — חיפוש</div><div class="sec-line"></div></div>
<div id="stock-zone" style="display:none;">
  <div id="stock-chart" class="widget-full"></div>
</div>

<script>
const CG='CG-FvE2mXRFqvbmHX4WqD18oauc';

async function loadFG(){
  try{
    const r=await fetch('https://api.alternative.me/fng/?limit=1');
    const d=await r.json();
    const v=parseInt(d.data[0].value);
    const l=d.data[0].value_classification;
    document.getElementById('fg-val').textContent=v;
    document.getElementById('fg-label').textContent=l;
    document.getElementById('fg-bar').style.width=v+'%';
    const c=v<25?'#f85149':v<50?'#d29922':v<75?'#3fb950':'#58a6ff';
    document.getElementById('fg-bar').style.background=c;
    document.getElementById('fg-val').style.color=c;
  }catch(e){}
}

async function loadBTCDom(){
  try{
    const r=await fetch(`https://api.coingecko.com/api/v3/global?x_cg_demo_api_key=${CG}`);
    const d=await r.json();
    document.getElementById('btc-dom').textContent=d.data.market_cap_percentage.btc.toFixed(1)+'%';
  }catch(e){}
}

function searchStock(){
  const ticker=document.getElementById('ti').value.trim().toUpperCase();
  if(!ticker)return;
  const zone=document.getElementById('stock-zone');
  const chart=document.getElementById('stock-chart');
  zone.style.display='block';
  chart.innerHTML=`
    <div class="tradingview-widget-container">
      <div id="tv-${ticker}"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/tv.js"><\/script>
      <script type="text/javascript">
        new TradingView.widget({
          width:"100%",height:500,
          symbol:"${ticker}",
          interval:"D",timezone:"Etc/UTC",
          theme:"dark",style:"1",locale:"en",
          toolbar_bg:"#161b22",
          enable_publishing:false,
          withdateranges:true,
          hide_side_toolbar:false,
          container_id:"tv-${ticker}"
        });
      <\/script>
    </div>`;
  zone.scrollIntoView({behavior:'smooth'});
}

loadFG();
loadBTCDom();
setInterval(loadFG,300000);
</script>
</body>
</html>
